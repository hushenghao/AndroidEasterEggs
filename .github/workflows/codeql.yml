name: CodeQL

on:
  push:
    branches: [ main ]
    paths:
      - 'app/**'
      - 'basic/**'
      - 'core/**'
      - 'feature/**'
      - 'eggs/**'
      - 'build-logic/**'
      - 'jvm-basic/**'
      - 'gradle/**'
      - 'script/**/*.py'
      - 'fastlane/**'
      - 'Gemfile'
      - 'Gemfile.lock'
      - '*.kts'
      - 'gradle.properties'
      - '.github/workflows/codeql.yml'
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '25 3 * * 1'

permissions:
  actions: read
  contents: read
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: java-kotlin
            build-mode: manual
          - language: python
            build-mode: none
          - language: ruby
            build-mode: none

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up JDK
        if: matrix.language == 'java-kotlin'
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Build project for CodeQL (Java/Kotlin)
        if: matrix.language == 'java-kotlin'
        id: build
        continue-on-error: true
        run: |
          chmod +x ./gradlew
          ./gradlew app:assembleFossBetaDebug --no-daemon 2>&1 | tee "$RUNNER_TEMP/build.log"

      - name: Check CodeQL extractor for Kotlin version too recent
        id: check-extractor
        if: matrix.language == 'java-kotlin'
        run: |
          if grep -q "KotlinVersionTooRecentError\|Kotlin version.*too recent" \
            "$RUNNER_TEMP/build.log" 2>/dev/null; then
            echo "kotlin_ok=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Kotlin version too recent for CodeQL extractor. Skipping java-kotlin analysis."
          else
            echo "kotlin_ok=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Perform CodeQL Analysis
        if: steps.check-extractor.outputs.kotlin_ok != 'false' || matrix.language != 'java-kotlin'
        uses: github/codeql-action/analyze@v4
        with:
          category: '/language:${{ matrix.language }}'
