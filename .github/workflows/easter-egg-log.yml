name: Easter Egg GitLog

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0'  # 每周日零点运行

jobs:
  easter-egg-gitlog:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Run easter-egg-log script
        run: |
          cd script/easter-egg-log
          pip install -r requirements.txt
          python index.py

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet git_logs.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.check_changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: 'chore: Update easter egg log'
          title: 'chore: Update Easter Egg Log'
          body: 'Automated changes from easter-egg-log script'
          branch: update-log-${{ github.run_number }}
          delete-branch: true
          labels: 'easter-egg'